<script>
const STORE_ICONS = {
  'キャバクラ': '🌸', 'ラウンジ': '✦', 'クラブ': '🌙',
  'スナック': '🌿', 'ガールズバー': '🌺', 'バー': '🍷'
};

let allStores = [];
let currentSort = 'recommend';
let currentPage = 1;
const PER_PAGE = 9;

async function fetchStores() {
  const grid = document.getElementById('storeGrid');
  try {
    const res = await fetch('/api/stores');
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    allStores = Array.isArray(data) ? data : (data.stores || []);
    const cnt = allStores.length;
    const h1 = document.getElementById('heroStoreCnt');
    const h2 = document.getElementById('heroStoreCnt2');
    if (h1) h1.textContent = cnt;
    if (h2) h2.textContent = cnt;
    renderStores();
  } catch (err) {
    console.error('Stores fetch error:', err);
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#e53935;"><div style="font-size:1.5rem;margin-bottom:8px;">⚠️</div><div style="font-size:.85rem;">データの読み込みに失敗しました。しばらくしてからリロードしてください。</div></div>';
    document.getElementById('resultCnt').textContent = '0';
    document.getElementById('resultCntLabel').textContent = '件';
  }
}

/* ── 検索フィルタリング ── */
function getFilteredStores() {
  const keyword = (document.querySelector('.sb-in:nth-child(1)') || {value:''}).value.toLowerCase();
  // キーワード入力（3番目のsb-in）
  const kInputs = document.querySelectorAll('.sb-in');
  const kw = kInputs[2] ? kInputs[2].value.toLowerCase() : '';
  const genreInput = kInputs[1] ? kInputs[1].value.toLowerCase() : '';

  // 業種チェックボックス
  const checkedGenres = [...document.querySelectorAll('.sbox-cbs .scb input:checked')]
    .map(cb => cb.parentElement.textContent.trim());

  // こだわりタグ
  const activeTags = [...document.querySelectorAll('.stag.on')]
    .map(t => t.textContent.trim());

  // 時給レンジ
  const rangeInputs = document.querySelectorAll('input[type=range]');
  const minWage = rangeInputs[0] ? parseInt(rangeInputs[0].value) : 0;
  const maxWage = rangeInputs[1] ? parseInt(rangeInputs[1].value) : 99999;

  let s = [...allStores];

  // キーワードフィルタ
  if (kw) {
    s = s.filter(store =>
      (store.name || '').toLowerCase().includes(kw) ||
      (store.pr_text || store.description || '').toLowerCase().includes(kw) ||
      (store.genre || '').toLowerCase().includes(kw)
    );
  }

  // 業種フィルタ（チェックボックス）
  if (checkedGenres.length > 0) {
    s = s.filter(store => checkedGenres.includes(store.genre));
  }

  // 時給フィルタ
  s = s.filter(store => {
    const storeMin = store.min_wage || store.hourly_min || 0;
    const storeMax = store.max_wage || store.hourly_max || 0;
    return storeMax >= minWage && storeMin <= maxWage;
  });

  // ソート
  if (currentSort === 'pay') {
    s.sort((a, b) => (b.max_wage || b.hourly_max || 0) - (a.max_wage || a.hourly_max || 0));
  } else if (currentSort === 'new') {
    s.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
  }

  return s;
}

function renderStores(stores) {
  stores = stores || getFilteredStores();
  const grid = document.getElementById('storeGrid');
  const pagArea = document.getElementById('pagArea');

  const total = stores.length;
  const totalPages = Math.ceil(total / PER_PAGE);
  if (currentPage > totalPages) currentPage = 1;

  const start = (currentPage - 1) * PER_PAGE;
  const pageStores = stores.slice(start, start + PER_PAGE);

  document.getElementById('resultCnt').textContent = total;
  document.getElementById('resultCntLabel').textContent = '件見つかりました';

  if (pageStores.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--lt);"><div style="font-size:1.5rem;margin-bottom:8px;">🔍</div><div style="font-size:.85rem;">条件に合う求人が見つかりませんでした</div></div>';
    pagArea.innerHTML = '';
    return;
  }

  grid.innerHTML = pageStores.map((s, i) => buildCard(s, i)).join('');

  if (totalPages <= 1) {
    pagArea.innerHTML = '';
  } else {
    let pagHtml = '';
    if (currentPage > 1) pagHtml += `<button class="pg" onclick="goPage(${currentPage-1})">‹ 前</button>`;
    for (let p = 1; p <= totalPages; p++) {
      pagHtml += `<button class="pg ${p === currentPage ? 'on' : ''}" onclick="goPage(${p})">${p}</button>`;
    }
    if (currentPage < totalPages) pagHtml += `<button class="pg" onclick="goPage(${currentPage+1})">次 ›</button>`;
    pagArea.innerHTML = pagHtml;
  }
}

function goPage(p) {
  currentPage = p;
  renderStores();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildCard(s, idx) {
  const icon = STORE_ICONS[s.genre] || '🏪';
  const minW = s.hourly_min || s.min_wage || 0;
  const maxW = s.hourly_max || s.max_wage || 0;
  const payMin = minW ? '¥' + Number(minW).toLocaleString() : '—';
  const payMax = maxW ? '〜¥' + Number(maxW).toLocaleString() : '';

  let badges = '';
  if (s.plan === 'premium') badges += '<span class="cbdg b-pick">★ PICK UP</span>';
  if (maxW >= 10000) badges += '<span class="cbdg b-hi">高時給</span>';
  if (s.is_urgent) badges += '<span class="cbdg b-urg">🔥 急募</span>';
  if (s.is_new) badges += '<span class="cbdg b-new">✨ NEW</span>';

  const features = s.features || [];
  const chips = features.slice(0, 4).map(f => `<span class="chip">${f}</span>`).join('');
  const payTag = s.pay_bonus ? `<span class="cp-tag">${s.pay_bonus}</span>` : '';

  let dateHtml = '';
  if (s.created_at) {
    const diff = Math.floor((Date.now() - new Date(s.created_at)) / 86400000);
    if (diff === 0) dateHtml = '<div class="ndot"></div>本日掲載';
    else if (diff <= 3) dateHtml = `<div class="ndot"></div>${diff}日前`;
    else dateHtml = `${diff}日前`;
  }

  const imgHtml = s.image_url
    ? `<img src="${s.image_url}" alt="${s.name}" loading="lazy" style="width:100%;height:100%;object-fit:cover;">`
    : `<div class="c-img-ph"><div class="cip-ico">${icon}</div><div class="cip-nm">${s.name}</div></div>`;

  const animDelay = idx < 6 ? `animation-delay:${idx * 0.05}s` : '';
  const desc = s.pr_text || s.description || '';

  return `<div class="jcard" style="${animDelay}">
    ${badges ? `<div class="cbadges">${badges}</div>` : ''}
    <div class="c-img">
      ${imgHtml}
      <div class="c-img-type">${s.genre || '—'}</div>
      <button class="c-bm" onclick="toggleBm(this);event.stopPropagation()">♡</button>
    </div>
    <div class="c-body">
      <div class="c-name">${s.name}</div>
      <div class="c-loc">📍 ${s.address || '東京都墨田区錦糸町'}</div>
      <div class="c-pay">
        <span class="cp-lbl">時給</span>
        <span class="cp-main">${payMin}</span>
        ${payMax ? `<span class="cp-max">${payMax}</span>` : ''}
        ${payTag}
      </div>
      ${chips ? `<div class="c-chips">${chips}</div>` : ''}
      <p class="c-desc">${desc}</p>
      <div class="c-foot">
        <div class="c-date">${dateHtml}</div>
        <button class="c-apply" onclick="openModal('${s.name.replace(/'/g,"\\'")}','${(s.genre||'').replace(/'/g,"\\'")}','${payMin}${payMax}','${(s.contact_email||s.owner_email||'').replace(/'/g,"\\'")}')">体入に応募する</button>
      </div>
    </div>
  </div>`;
}

function setSrt(b) {
  document.querySelectorAll('.srt').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  const txt = b.textContent;
  if (txt.includes('時給')) currentSort = 'pay';
  else if (txt.includes('新着')) currentSort = 'new';
  else currentSort = 'recommend';
  currentPage = 1;
  renderStores();
}

document.addEventListener('DOMContentLoaded', function() {
  fetchStores();

  // 検索ボタン
  const sbBtn = document.querySelector('.sb-btn');
  if (sbBtn) sbBtn.addEventListener('click', function() {
    currentPage = 1;
    renderStores();
  });

  // サイドバー検索ボタン
  const sidebarBtn = document.querySelector('.sidebar-apply');
  if (sidebarBtn) sidebarBtn.addEventListener('click', function() {
    currentPage = 1;
    renderStores();
  });
});

/* ── page navigation ── */
function showPage(id, btn, isMobile) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pg-' + id).classList.add('on');
  document.querySelectorAll('.hnav-tab').forEach(b => b.classList.remove('on'));
  const pcTab = document.querySelector(`.hnav-tab[onclick*="${id}"]`);
  if (pcTab) pcTab.classList.add('on');
  if (isMobile) {
    document.querySelectorAll('.bnav-item').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleBm(b) { b.classList.toggle('on'); b.textContent = b.classList.contains('on') ? '♥' : '♡'; }

function selPlan(c, n, p) {
  document.querySelectorAll('.pc').forEach(x => x.classList.remove('sel'));
  c.classList.add('sel');
  document.getElementById('pb-name').textContent = n;
  document.getElementById('pb-price').textContent = p;
}

/* ── 掲載申請送信 ── */
async function ownerSend(btn) {
  btn.textContent = '送信中...';
  btn.disabled = true;

  const fields = document.querySelectorAll('#pg-owner .fi');
  const storeName   = fields[0]?.value || '';
  const genre       = fields[1]?.value || '';
  const address     = fields[2]?.value || '';
  const pr          = fields[3]?.value || '';
  const payMin      = fields[4]?.value || '';
  const payMax      = fields[5]?.value || '';
  const openTime    = fields[6]?.value || '';
  const closeTime   = fields[7]?.value || '';
  const managerName = fields[8]?.value || '';
  const tel         = fields[9]?.value || '';
  const ownerEmail  = fields[10]?.value || '';
  const lineId      = fields[11]?.value || '';

  const planName  = document.getElementById('pb-name')?.textContent || '';
  const planPrice = document.getElementById('pb-price')?.textContent || '';

  const featuresArr = [...document.querySelectorAll('#pg-owner .cbi input:checked')]
    .map(cb => cb.parentElement.textContent.trim());

  // バリデーション
  if (!storeName || !ownerEmail) {
    btn.textContent = '⚠️ 店舗名・メールアドレスは必須です';
    btn.style.background = '#e53935';
    btn.disabled = false;
    setTimeout(() => {
      btn.textContent = '掲載申請を送信する →';
      btn.style.background = '';
      btn.disabled = false;
    }, 3000);
    return;
  }

  let success = false;

  // ① Supabaseのlisting_requestsテーブルに保存
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/listing_requests`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        store_name:    storeName,
        genre:         genre,
        address:       address,
        description:   pr,
        hourly_min:    payMin ? Number(payMin.replace(/[^0-9]/g,'')) : null,
        hourly_max:    payMax ? Number(payMax.replace(/[^0-9]/g,'')) : null,
        open_time:     openTime,
        close_time:    closeTime,
        features:      featuresArr,
        manager_name:  managerName,
        phone:         tel,
        contact_email: ownerEmail,
        line_id:       lineId,
        plan:          planName,
        status:        'pending'
      })
    });
    if (r.ok || r.status === 201) success = true;
  } catch(e) {
    console.error('Supabase保存エラー:', e);
  }

  // ② メール送信
  try {
    await fetch(`${SUPABASE_URL}/functions/v1/send-email`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({
        type: 'listing',
        data: {
          store_name:    storeName,
          genre:         genre,
          address:       address,
          hourly_min:    payMin,
          hourly_max:    payMax,
          manager_name:  managerName,
          phone:         tel,
          contact_email: ownerEmail,
          plan:          planName,
          plan_price:    planPrice
        }
      })
    });
  } catch(e) {
    console.error('メール送信エラー:', e);
  }

  if (success) {
    btn.textContent = '✓ 申請受付完了！2営業日以内にご連絡します';
    btn.style.background = '#2e7d32';
  } else {
    btn.textContent = '⚠️ 送信に失敗しました。再度お試しください';
    btn.style.background = '#e53935';
    btn.disabled = false;
  }
}

function previewImg(input) {
  if (!input.files || !input.files[0]) return;
  const r = new FileReader();
  r.onload = e => {
    const a = document.getElementById('imgArea');
    a.classList.add('has');
    const old = a.querySelector('img.prev');
    if (old) old.remove();
    const img = document.createElement('img');
    img.src = e.target.result;
    img.className = 'prev';
    a.insertBefore(img, a.firstChild);
  };
  r.readAsDataURL(input.files[0]);
}

/* ── 3-step modal ── */
let step = 1, aS = '', aT = '', aP = '', aD = '3月12日', aTime = '19:00〜', aOwnerEmail = '';

function openModal(s, t, p, ownerEmail) {
  aS = s; aT = t; aP = p; aOwnerEmail = ownerEmail || ''; step = 1;
  document.getElementById('mStore').textContent = s;
  document.getElementById('msuc').classList.remove('show');
  ['mHead','mBody','mFoot'].forEach(id => document.getElementById(id).style.display = '');
  upStep();
  document.getElementById('applyModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('applyModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('applyModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function upStep() {
  [1, 2, 3].forEach(n => {
    document.getElementById('sp' + n).classList.toggle('act', n === step);
    const m = document.getElementById('ms' + n);
    m.className = 'ms' + (n === step ? ' act' : n < step ? ' done' : '');
  });
  document.getElementById('mpf').style.width = { 1:'33%', 2:'66%', 3:'100%' }[step];
  document.getElementById('mTitle').textContent = { 1:'プロフィールを入力', 2:'体入希望日を選ぶ', 3:'内容を確認する' }[step];
  document.getElementById('btnBack').style.display = step > 1 ? 'block' : 'none';
  const nb = document.getElementById('btnNext');
  if (step === 3) { nb.className = 'btn-sub'; nb.textContent = '体入に申し込む →'; nb.onclick = submit; }
  else { nb.className = 'btn-next'; nb.textContent = '次へ →'; nb.onclick = stepNext; }
}

function stepNext() {
  if (step === 2) {
    document.getElementById('ccStore').textContent   = aS + (aT ? ' — ' + aT : '');
    document.getElementById('ccName').textContent    = document.getElementById('fName').value || '（未入力）';
    document.getElementById('ccAge').textContent     = document.getElementById('fAge').value;
    document.getElementById('ccExp').textContent     = document.getElementById('fExp').value;
    document.getElementById('ccContact').textContent = document.getElementById('fContact').value || '（未入力）';
    document.getElementById('ccDate').textContent    = aD + ' ' + aTime;
    document.getElementById('ccPay').textContent     = aP || '—';
  }
  if (step < 3) { step++; upStep(); }
}

function stepBack() { if (step > 1) { step--; upStep(); } }

async function submit() {
  const btn = document.getElementById('btnNext');
  btn.textContent = '送信中...';
  btn.disabled = true;

  try {
    const r = await fetch(`${SUPABASE_URL}/functions/v1/send-email`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({
        type: 'apply',
        data: {
          store_name: aS,
          genre: aT,
          pay: aP,
          owner_email: aOwnerEmail,
          name: document.getElementById('fName').value || '（未入力）',
          age: document.getElementById('fAge').value,
          experience: document.getElementById('fExp').value,
          contact: document.getElementById('fContact').value || '（未入力）',
          date: aD + ' ' + aTime
        }
      })
    });
  } catch(e) {
    console.error('送信エラー:', e);
  }

  ['mHead','mBody','mFoot'].forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('msuc').classList.add('show');
}

function pickD(el) {
  document.querySelectorAll('.dopt').forEach(d => d.classList.remove('pk'));
  el.classList.add('pk');
  aD = '3月' + el.querySelector('.do-d').textContent + '日';
}

function pickT(el) {
  document.querySelectorAll('.topt').forEach(t => t.classList.remove('pk'));
  el.classList.add('pk');
  aTime = el.textContent;
}
</script>
